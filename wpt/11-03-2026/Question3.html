<html>
    <head>
        <title>Assignment no 3</title>
        <script src="jquery-4.0.0.min.js"></script>
        <script>
            $('document').ready(function(){
     $('#btn1').click(function(){
           $('h1').text("Single Click ");
     }) 
     $('#btn2').dblclick(function(){
           $('h1').text("Double Click");
     }) 
            })
        </script>
    </head>
    <body>
        <button type="button" id="btn1" >Click</button>
        <button type="button" id="btn2" >Double Click</button>
        <h1></h1>
    </body>
</html>
